{% extends "layouts/base.html" %}
{% set project = "Club Finder" %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='assets/club-finder.css') }}">
{% endblock %}

{% block body %}
<div class="club-finder-page">
    <section class="club-finder-shell">
        <div class="club-finder-panel">
            <div
                id="club-finder-app"
                class="club-finder-app"
                data-layout-url="{{ url_for('club_finder_api.club_finder_layout') }}"
            ></div>
        </div>
    </section>
</div>
<script src="{{ url_for('static', filename='js/club-finder.js') }}"></script>
{% endblock %}

{% block background %}
<script>
    const bodyBackground = document.getElementById('body_background');
    if (bodyBackground) {
        bodyBackground.style.background = [
            'radial-gradient(circle at top left, rgba(64, 154, 255, 0.2), transparent 30%)',
            'radial-gradient(circle at right center, rgba(34, 107, 255, 0.18), transparent 28%)',
            'linear-gradient(180deg, #071225 0%, #0b1730 48%, #081220 100%)'
        ].join(',');
    }
</script>
{% endblock %}
